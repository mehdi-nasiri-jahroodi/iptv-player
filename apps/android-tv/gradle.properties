# AndroidX
android.useAndroidX=true

# Build optimization
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true
org.gradle.configuration-cache=true
org.gradle.jvmargs=-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Kotlin
kotlin.code.style=official

# Compose compiler — use Kotlin 2.0+ bundled compiler
# (No separate compose compiler version needed with K2)
