[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = []

[phases.build]
cmds = ["npm install -g pnpm@9.15.9 && PATH=\"$(npm prefix -g)/bin:$PATH\" pnpm install --frozen-lockfile && cd apps/web-proxy && PATH=\"$(npm prefix -g)/bin:$PATH\" ../../node_modules/.bin/tsc --build tsconfig.lib.json"]

[start]
cmd = "node apps/web-proxy/dist/main.js"
