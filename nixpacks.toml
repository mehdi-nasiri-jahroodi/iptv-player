[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = []

[phases.build]
cmds = ["npm install -g pnpm@9.15.9 && PATH=\"$(npm prefix -g)/bin:$PATH\" pnpm install --frozen-lockfile && PATH=\"$(npm prefix -g)/bin:$PATH\" pnpm exec nx build web-proxy"]

[start]
cmd = "node apps/web-proxy/dist/main.js"
